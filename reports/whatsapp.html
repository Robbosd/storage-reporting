<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Activity — AnyVan Storage</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--cl:#f5f5f7;--cd:#1c1c1e;--b:rgba(255,255,255,0.08);
  --mid:#86868b;--td:#000000;--tl:#f5f5f7;--gold:#0071e3;
  --wa:#25D366;
  --mono:'SF Mono','Menlo','Monaco',monospace;--sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
}
body{background:#000;font-family:var(--sans);color:var(--tl);min-height:100vh;padding:44px 60px}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.back{font-size:15px;color:var(--mid);text-decoration:none;transition:color .12s;display:flex;align-items:center;gap:6px}
.back:hover{color:var(--tl)}
.month-sel{background:var(--cd);border:1px solid var(--b);border-radius:8px;padding:7px 12px;font-family:var(--mono);font-size:15px;color:var(--tl);outline:none;cursor:pointer}
.month-sel option{background:#1c1c1e}

.ph{margin-bottom:36px}
.ph-lbl{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:7px}
.ph-title{font-size:28px;font-weight:600;letter-spacing:-.01em}
.ph-sub{font-size:16px;color:var(--mid);margin-top:5px;font-family:var(--mono)}

.sec{margin-bottom:40px}
.sec-lbl{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,0.07)}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}

th{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);padding:10px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.07);white-space:nowrap;font-weight:500}
th:first-child,th:nth-child(2){text-align:left}
td{font-family:var(--mono);font-size:14px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--mid);text-align:right;white-space:nowrap}
td:first-child{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--tl);text-align:left}
td:nth-child(2){font-family:var(--sans);font-size:14px;text-align:left;color:var(--mid)}
tr:hover td{background:rgba(255,255,255,0.02)}

/* Column group dividers */
th.grp-ib,td.grp-ib{border-left:2px solid rgba(0,113,227,0.2)}
th.grp-ob,td.grp-ob{border-left:2px solid rgba(255,255,255,0.07)}
th.grp-eng,td.grp-eng{border-left:2px solid rgba(37,211,102,0.2)}

/* Reply rate colouring */
td.rate-good{color:#5cb85c;font-weight:600}
td.rate-warn{color:#d4a017;font-weight:600}
td.rate-low{color:var(--mid)}

/* Date separator rows */
tr.date-sep td{background:rgba(255,255,255,0.03);font-family:var(--sans);font-size:14px;font-weight:600;color:var(--cl);text-align:left;padding:8px 12px;border-bottom:none;border-top:1px solid rgba(255,255,255,0.06)}

.loading{font-size:16px;color:var(--mid);padding:40px 0;text-align:center}

/* Team toggle */
.toggle-group{display:flex;gap:6px}
.toggle-btn{background:var(--cd);border:1px solid var(--b);border-radius:7px;padding:6px 16px;font-family:var(--sans);font-size:15px;color:var(--mid);cursor:pointer;transition:all .12s}
.toggle-btn:hover{border-color:rgba(232,226,213,0.2);color:var(--tl)}
.toggle-btn.active{background:var(--gold);border-color:transparent;color:#000000;font-weight:600}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px}

.refresh-btn{background:none;border:1px solid var(--b);border-radius:7px;padding:5px 12px;font-family:var(--sans);font-size:13px;color:var(--mid);cursor:pointer;transition:all .12s}
.refresh-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.refresh-btn:disabled{opacity:0.5;cursor:default}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="../index.html">← Reporting home</a>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="toggle-group">
      <button class="toggle-btn active" onclick="setTeam('all',this)">All</button>
      <button class="toggle-btn" onclick="setTeam('ops',this)">Ops</button>
      <button class="toggle-btn" onclick="setTeam('sales',this)">Sales</button>
    </div>
    <select class="month-sel" id="month-sel" onchange="switchMonth(this.value)"></select>
    <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()">↻ Refresh</button>
  </div>
</div>

<div class="ph">
  <div class="ph-lbl">Storage</div>
  <div class="ph-title">WhatsApp Activity</div>
  <div class="ph-sub" id="ph-sub">Loading…</div>
</div>

<div class="sec">
  <div class="sec-lbl" id="table-lbl">All agents</div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Date</th>
        <th>Agent</th>
        <th class="grp-ib">IB Chats</th>
        <th>Avg Wait</th>
        <th>Avg 1st Resp</th>
        <th>Avg Wrap</th>
        <th>IB Talk</th>
        <th class="grp-ob">OB Chats</th>
        <th>OB Talk</th>
        <th class="grp-eng">Initiated</th>
        <th>Msgs Sent</th>
        <th>Replied</th>
        <th>Reply Rate</th>
      </tr></thead>
      <tbody id="wa-body"><tr><td colspan="13" class="loading">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://loyvicdabsncwhssjkxy.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxveXZpY2RhYnNuY3doc3Nqa3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDc1ODYsImV4cCI6MjA5MDEyMzU4Nn0.2K1YSzw80na6JSmEAgUWAAAIzLZT52wL5Gn_iRnVhEg'
const { createClient } = window.supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const MO  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
const DAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']

let ALL_DATA       = []
let SELECTED_MONTH = null
let SELECTED_TEAM  = 'all'

function fmtSecs(s){
  if(s == null || s === 0) return '—'
  const m   = Math.floor(s / 60)
  const sec = s % 60
  return `${m}:${String(sec).padStart(2,'0')}`
}

function fmtDate(iso){
  const d = new Date(iso + 'T00:00:00')
  return `${DAY[d.getDay()]} ${d.getDate()} ${MO[d.getMonth()]}`
}

function monthLabel(iso){
  const [y,m] = iso.split('-')
  return `${MO[parseInt(m)-1]} ${y}`
}

function replyRateCell(initiated, replied){
  if(!initiated) return '<td class="grp-eng">—</td>'
  const pct = Math.round((replied / initiated) * 100)
  const cls = pct >= 30 ? 'rate-good' : pct >= 15 ? 'rate-warn' : 'rate-low'
  return `<td class="grp-eng ${cls}">${pct}%</td>`
}

async function loadAll(){
  const { data, error } = await db
    .from('whatsapp_daily')
    .select('date')
    .order('date', { ascending: false })

  if(error || !data || !data.length){
    document.getElementById('ph-sub').textContent = 'No data yet — run fetch_whatsapp.py to populate.'
    document.getElementById('wa-body').innerHTML = '<tr><td colspan="13" style="text-align:center;color:var(--mid);padding:20px;font-size:15px">No data available</td></tr>'
    return
  }

  const months = [...new Set(data.map(r => r.date.slice(0,7)))].sort().reverse()

  const sel = document.getElementById('month-sel')
  sel.innerHTML = months.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('')

  const now = new Date()
  const curLabel = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`
  SELECTED_MONTH = months.includes(curLabel) ? curLabel : months[0]
  sel.value = SELECTED_MONTH

  await loadMonth()
}

async function loadMonth(){
  const [year, month] = SELECTED_MONTH.split('-').map(Number)
  const from = `${SELECTED_MONTH}-01`
  const to   = new Date(year, month, 0).toISOString().slice(0,10)

  const { data, error } = await db
    .from('whatsapp_daily')
    .select('*')
    .gte('date', from)
    .lte('date', to)
    .order('date', { ascending: false })
    .order('agent', { ascending: true })

  ALL_DATA = data || []

  const days = [...new Set(ALL_DATA.map(r => r.date))].sort().reverse()
  document.getElementById('ph-sub').textContent =
    `${monthLabel(SELECTED_MONTH)} · ${days.length} day${days.length !== 1 ? 's' : ''} of data`

  renderTable()
}

function switchMonth(val){
  SELECTED_MONTH = val
  loadMonth()
}

function setTeam(team, btn){
  SELECTED_TEAM = team
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  const labels = { all: 'All agents', ops: 'Ops team', sales: 'Sales team' }
  document.getElementById('table-lbl').textContent = labels[team]
  renderTable()
}

function n(v){ return v != null ? v : '—' }

function renderTable(){
  const rows = SELECTED_TEAM === 'all'
    ? ALL_DATA
    : ALL_DATA.filter(r => r.team === SELECTED_TEAM)

  const tbody = document.getElementById('wa-body')
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;color:var(--mid);padding:20px;font-size:15px">No data for this selection</td></tr>'
    return
  }

  const dates = [...new Set(rows.map(r => r.date))].sort().reverse()
  let html = ''
  for(const d of dates){
    const dayRows = rows.filter(r => r.date === d)
    html += `<tr class="date-sep"><td colspan="13">${fmtDate(d)}</td></tr>`
    for(const r of dayRows){
      html += `<tr>
        <td></td>
        <td>${r.agent}</td>
        <td class="grp-ib">${n(r.ib_chats)}</td>
        <td>${fmtSecs(r.ib_avg_wait)}</td>
        <td>${fmtSecs(r.ib_avg_first_response)}</td>
        <td>${fmtSecs(r.ib_avg_wrap)}</td>
        <td>${fmtSecs(r.ib_talk_time)}</td>
        <td class="grp-ob">${n(r.ob_chats)}</td>
        <td>${fmtSecs(r.ob_talk_time)}</td>
        <td class="grp-eng">${n(r.eng_convos_initiated)}</td>
        <td>${n(r.eng_messages_sent)}</td>
        <td>${n(r.eng_customers_replied)}</td>
        ${replyRateCell(r.eng_convos_initiated, r.eng_customers_replied)}
      </tr>`
    }
  }
  tbody.innerHTML = html
}

const GITHUB_PAT  = 'worker-handles-auth'
const GITHUB_REPO = 'Robbosd/storage-reporting'
const WORKFLOW_ID = 'fetch_whatsapp.yml'

async function triggerRefresh(){
  const btn = document.getElementById('refresh-btn')
  btn.disabled = true
  btn.innerHTML = '<span class="spin">↻</span> Refreshing…'
  try{
    const dispatch = await fetch(
      `https://storage-dispatch.scottrobinson92.workers.dev/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`,
      {method:'POST',headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})}
    )
    if(!dispatch.ok) throw new Error(`Dispatch failed: ${dispatch.status}`)
    await new Promise(r=>setTimeout(r,5000))
    let runId = null
    for(let i=0;i<12;i++){
      const runs = await fetch(`https://storage-dispatch.scottrobinson92.workers.dev/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/runs?per_page=1`,
        {headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json'}})
      const d = await runs.json()
      if(d.workflow_runs?.[0]){runId=d.workflow_runs[0].id;break}
      await new Promise(r=>setTimeout(r,3000))
    }
    if(!runId) throw new Error('Could not find workflow run')
    for(let i=0;i<50;i++){
      await new Promise(r=>setTimeout(r,6000))
      const check = await fetch(`https://storage-dispatch.scottrobinson92.workers.dev/repos/${GITHUB_REPO}/actions/runs/${runId}`,
        {headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json'}})
      const run = await check.json()
      if(run.status==='completed'){
        if(run.conclusion!=='success') throw new Error(`Workflow ${run.conclusion}`)
        break
      }
    }
    await new Promise(r=>setTimeout(r,12000))
    location.reload()
  }catch(e){
    alert('Refresh failed: '+e.message)
    console.error(e)
  }finally{
    btn.disabled = false
    btn.innerHTML = '↻ Refresh'
  }
}

loadAll()
</script>
</body>
</html>
