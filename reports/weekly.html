<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly KPI — AnyVan Storage</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;
  --surface:#1c1c1e;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --mid:#86868b;
  --dim:#2c2c2e;
  --tl:#f5f5f7;
  --gold:#0071e3;
  --mono:'SF Mono','Menlo','Monaco',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
}
html,body{height:100%;background:#000;font-family:var(--sans);color:var(--tl);overflow:hidden}
body{display:flex;flex-direction:column}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  border-bottom:1px solid var(--border2);
  background:var(--bg);
  flex-shrink:0;
  z-index:30;
}
.back{font-size:14px;color:var(--mid);text-decoration:none;letter-spacing:.04em;transition:color .1s}
.back:hover{color:var(--tl)}
.topbar-title{font-size:15px;font-weight:600;color:var(--tl);letter-spacing:-.01em}
.topbar-meta{font-size:12px;color:var(--mid);font-family:var(--mono)}
.window-btns{display:flex;gap:4px}
.wbtn{font-size:13px;font-family:var(--mono);color:var(--mid);background:none;border:1px solid var(--border);border-radius:4px;padding:3px 9px;cursor:pointer;transition:color .1s,border-color .1s}
.wbtn:hover{color:var(--tl);border-color:var(--border2)}
.wbtn.active{color:var(--gold);border-color:var(--gold)}

/* MATRIX WRAPPER */
.matrix-wrap{flex:1;overflow:auto;position:relative}

/* TABLE */
table{border-collapse:collapse;white-space:nowrap;font-size:18px}

/* ── SECTION DIVIDER ROWS ── */
tr.sec-hdr>td{
  background:var(--surface);
  padding:12px 10px 8px;
  font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  border-top:2px solid var(--border2);
  border-bottom:1px solid var(--border2);
}
tr.sec-hdr>td.sec-label{
  position:sticky;left:0;z-index:9;
  background:var(--surface);
  padding-left:14px;
  vertical-align:middle;
}
.sec-name{display:block}
.sec-range{
  display:block;
  font-family:var(--mono);
  font-size:10px;font-weight:400;
  letter-spacing:.04em;text-transform:none;
  color:var(--mid);
  margin-top:3px;
}
tr.sec-hdr>td.sec-metric{
  position:sticky;left:64px;z-index:9;
  background:var(--surface);
  border-right:1px solid var(--border2);
  padding-left:10px;
}
tr.sec-hdr>td.sec-date{
  font-family:var(--mono);
  font-size:16px;font-weight:500;
  letter-spacing:.06em;
  color:var(--mid);
  text-align:right;
  padding:12px 12px 8px;
}

/* ── DATA ROWS ── */
tr.dr>td{
  border-bottom:1px solid rgba(255,255,255,0.035);
  vertical-align:middle;
}
tr.dr:hover>td{background:rgba(255,255,255,0.03) !important}

td.c-section{
  position:sticky;left:0;z-index:9;
  background:var(--bg);
  width:64px;min-width:64px;max-width:64px;
  padding:5px 6px 5px 14px;
  font-size:7px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:transparent;
  vertical-align:top;
}
td.c-metric{
  position:sticky;left:64px;z-index:9;
  background:var(--bg);
  width:280px;min-width:280px;max-width:280px;
  padding:7px 14px 7px 10px;
  font-size:18px;color:var(--tl);
  border-right:1px solid var(--border2);
}
tr.dr:hover>td.c-section,
tr.dr:hover>td.c-metric{background:rgba(255,255,255,0.03)}

td.c-val{
  font-family:var(--mono);
  font-size:18px;
  color:#86868b;
  text-align:right;
  padding:7px 12px;
  min-width:100px;
}
td.c-val.empty{color:var(--dim)}

/* STATE */
.state{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--mid);
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:3px}

.refresh-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-family:var(--mono);font-size:13px;color:var(--mid);cursor:pointer;transition:color .1s,border-color .1s}
.refresh-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.refresh-btn:disabled{opacity:0.5;cursor:default}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="../index.html">← Reporting home</a>
  <span class="topbar-title">Weekly KPI</span>
  <div class="window-btns" id="wbtns" style="display:none">
    <button class="wbtn" data-w="8">Last 8w</button>
    <button class="wbtn active" data-w="12">Last 12w</button>
    <button class="wbtn" data-w="0">All</button>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()">↻ Refresh</button>
  <span class="topbar-meta" id="meta">Loading…</span>
</div>

<div class="matrix-wrap" id="wrap">
  <div class="state" id="state">Loading…</div>
</div>

<script>
let _tableData = null
let _activeWindow = 12

function applyWindow(w){
  _activeWindow = w
  document.querySelectorAll('.wbtn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.w) === w)
  })
  if(!_tableData) return

  const total = _tableData.weeks.length
  const start = (w === 0 || w >= total) ? 0 : total - w

  // Update date range label in each section header
  const first = _tableData.weeks[start].label
  const last  = _tableData.weeks[total - 1].label
  const range = first === last ? first : `${first} – ${last}`
  document.querySelectorAll('.sec-range').forEach(el => el.textContent = range)

  // Show/hide data cells and section-hdr date cells
  document.querySelectorAll('tr.dr, tr.sec-hdr').forEach(tr => {
    tr.querySelectorAll('td').forEach((td, i) => {
      if(i < 2) return
      td.style.display = (i - 2) >= start ? '' : 'none'
    })
  })
}

async function load(){
  let data
  try{
    const r = await fetch('../data/weekly.json?_='+Date.now())
    if(!r.ok) throw new Error(r.status)
    data = await r.json()
  }catch(e){
    document.getElementById('state').textContent = 'Failed to load data/weekly.json'
    return
  }

  _tableData = data

  document.getElementById('meta').textContent =
    `${data.weeks[0].label} – ${data.weeks[data.weeks.length-1].label}  ·  updated ${data.updated}`

  const wrap  = document.getElementById('wrap')
  document.getElementById('state').remove()

  const table = document.createElement('table')
  const tbody = table.createTBody()

  // ── Body ─────────────────────────────────────────────
  data.sections.forEach(section => {

    // Section divider — label shows name + date range, date cells repeat across columns
    const sr = tbody.insertRow()
    sr.className = 'sec-hdr'

    const sdLabel = document.createElement('td')
    sdLabel.className = 'sec-label'
    const nameSpan = document.createElement('span')
    nameSpan.className = 'sec-name'
    nameSpan.textContent = section.name
    const rangeSpan = document.createElement('span')
    rangeSpan.className = 'sec-range'
    sdLabel.appendChild(nameSpan)
    sdLabel.appendChild(rangeSpan)
    sr.appendChild(sdLabel)

    const sdMetric = document.createElement('td')
    sdMetric.className = 'sec-metric'
    sr.appendChild(sdMetric)

    data.weeks.forEach(w => {
      const td = document.createElement('td')
      td.className = 'sec-date'
      td.textContent = w.label
      sr.appendChild(td)
    })

    // Data rows
    section.rows.forEach(row => {
      const tr = tbody.insertRow()
      tr.className = 'dr'

      const tdSec = document.createElement('td')
      tdSec.className = 'c-section'
      tr.appendChild(tdSec)

      const tdMet = document.createElement('td')
      tdMet.className = 'c-metric'
      tdMet.textContent = row.metric
      tr.appendChild(tdMet)

      row.values.forEach(v => {
        const td = document.createElement('td')
        const empty = v === ''
        td.className = 'c-val' + (empty ? ' empty' : '')
        td.textContent = empty ? '—' : v
        tr.appendChild(td)
      })
    })
  })

  wrap.appendChild(table)

  // Show window buttons and wire up
  const wbtns = document.getElementById('wbtns')
  wbtns.style.display = ''
  wbtns.querySelectorAll('.wbtn').forEach(b => {
    b.addEventListener('click', () => applyWindow(parseInt(b.dataset.w)))
  })

  applyWindow(_activeWindow)
}

const GITHUB_PAT  = 'worker-handles-auth'
const GITHUB_REPO = 'Robbosd/storage-reporting'
const WORKFLOW_ID = 'fetch_weekly.yml'

async function triggerRefresh(){
  const btn = document.getElementById('refresh-btn')
  const meta = document.getElementById('meta')
  btn.disabled = true
  btn.innerHTML = '<span class="spin">↻</span> Refreshing…'
  try{
    const dispatch = await fetch(
      `https://storage-dispatch.scottrobinson92.workers.dev/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`,
      {method:'POST',headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})}
    )
    if(!dispatch.ok) throw new Error(`Dispatch failed: ${dispatch.status}`)
    if(meta) meta.textContent = 'Triggering workflow…'
    await new Promise(r=>setTimeout(r,5000))
    let runId = null
    for(let i=0;i<12;i++){
      const runs = await fetch(`https://storage-dispatch.scottrobinson92.workers.dev/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/runs?per_page=1`,
        {headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json'}})
      const d = await runs.json()
      if(d.workflow_runs?.[0]){runId=d.workflow_runs[0].id;break}
      await new Promise(r=>setTimeout(r,3000))
    }
    if(!runId) throw new Error('Could not find workflow run')
    if(meta) meta.textContent = 'Workflow running…'
    for(let i=0;i<50;i++){
      await new Promise(r=>setTimeout(r,6000))
      const check = await fetch(`https://storage-dispatch.scottrobinson92.workers.dev/repos/${GITHUB_REPO}/actions/runs/${runId}`,
        {headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json'}})
      const run = await check.json()
      const elapsed = Math.round((i+1)*6/60*10)/10
      if(meta) meta.textContent = `Running… ${elapsed}m`
      if(run.status==='completed'){
        if(run.conclusion!=='success') throw new Error(`Workflow ${run.conclusion}`)
        break
      }
    }
    if(meta) meta.textContent = 'Deploying…'
    await new Promise(r=>setTimeout(r,12000))
    location.reload()
  }catch(e){
    alert('Refresh failed: '+e.message)
    console.error(e)
  }finally{
    btn.disabled = false
    btn.innerHTML = '↻ Refresh'
  }
}

load()
</script>
</body>
</html>
