name: Fetch MTD Data

on:
  workflow_dispatch:

concurrency:
  group: fetch-mtd
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil python-dotenv snowflake-connector-python

      - name: Write Snowflake config
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml << 'EOF'
          [connections.default]
          token = "${{ secrets.SNOWFLAKE_PAT }}"
          EOF

      - name: Write .env
        run: |
          cat > .env << 'EOF'
          ZOHO_CLIENT_ID=${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET=${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN=${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_BOOKS_ORG_ID=${{ secrets.ZOHO_BOOKS_ORG_ID }}
          ZOHO_REGION=eu
          EOF

      - name: Run fetch
        run: python3 scripts/fetch_mtd.py

      - name: Fetch bookings data
        run: python3 scripts/fetch_bookings.py
        continue-on-error: true
